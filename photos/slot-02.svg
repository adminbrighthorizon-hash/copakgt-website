<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="t d">
  <title id="t">Sample NGO photo: child health outreach</title>
  <desc id="d">Dummy image of a community health outreach session with children and caregivers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4eee8"/>
      <stop offset="100%" stop-color="#acd5cb"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.04"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="120" y="130" width="1360" height="760" rx="38" fill="#f3faf8" opacity="0.5"/>
  <rect x="980" y="260" width="360" height="460" rx="26" fill="#ffffff" opacity="0.8"/>
  <rect x="1030" y="340" width="260" height="20" rx="10" fill="#baded5"/>
  <rect x="1030" y="390" width="200" height="20" rx="10" fill="#baded5"/>
  <rect x="1030" y="440" width="230" height="20" rx="10" fill="#baded5"/>
  <circle cx="520" cy="450" r="78" fill="#5d4334"/>
  <rect x="448" y="525" width="144" height="220" rx="64" fill="#3f7f75"/>
  <circle cx="740" cy="478" r="66" fill="#6b4a39"/>
  <rect x="678" y="548" width="124" height="190" rx="56" fill="#ec9b5e"/>
  <circle cx="870" cy="522" r="52" fill="#734d39"/>
  <rect x="822" y="575" width="96" height="150" rx="46" fill="#f0bf72"/>
  <rect y="760" width="1600" height="240" fill="#8abfb2" opacity="0.7"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.6"/>
</svg>