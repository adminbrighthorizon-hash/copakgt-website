<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="t d">
  <title id="t">Sample NGO photo: school support</title>
  <desc id="d">Dummy image of children learning together with a teacher in a community classroom setting.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7dcb8"/>
      <stop offset="100%" stop-color="#edc596"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d39d66"/>
      <stop offset="100%" stop-color="#c58651"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.04"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect y="640" width="1600" height="360" fill="url(#ground)"/>
  <rect x="140" y="180" width="1320" height="720" rx="38" fill="#fff4e6" opacity="0.35"/>
  <circle cx="520" cy="455" r="72" fill="#6b4a3a"/>
  <rect x="456" y="530" width="128" height="190" rx="58" fill="#f4b063"/>
  <circle cx="760" cy="435" r="80" fill="#4c3529"/>
  <rect x="685" y="515" width="150" height="215" rx="64" fill="#4f8a74"/>
  <circle cx="1005" cy="455" r="68" fill="#5a4030"/>
  <rect x="942" y="530" width="126" height="190" rx="58" fill="#ce7e4d"/>
  <rect x="580" y="640" width="430" height="40" rx="20" fill="#f8e9d2" opacity="0.82"/>
  <rect x="580" y="700" width="430" height="14" rx="7" fill="#ead4b4"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.6"/>
</svg>