<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="t d">
  <title id="t">Sample NGO photo: family care session</title>
  <desc id="d">Dummy image of a caregiver support session with children in a community setting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efd8cc"/>
      <stop offset="100%" stop-color="#dcb39d"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.04"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <ellipse cx="820" cy="760" rx="560" ry="160" fill="#be8467" opacity="0.45"/>
  <circle cx="560" cy="430" r="88" fill="#5f3f31"/>
  <rect x="475" y="515" width="170" height="250" rx="70" fill="#cb6f46"/>
  <circle cx="810" cy="420" r="84" fill="#4e372c"/>
  <rect x="730" y="500" width="160" height="245" rx="68" fill="#4a8a73"/>
  <circle cx="1030" cy="460" r="72" fill="#6a4b3b"/>
  <rect x="962" y="536" width="136" height="212" rx="60" fill="#e0a763"/>
  <circle cx="1195" cy="525" r="55" fill="#6d4d3d"/>
  <rect x="1143" y="580" width="104" height="165" rx="50" fill="#f0c98f"/>
  <rect x="290" y="240" width="1020" height="560" rx="34" fill="#fff2ea" opacity="0.24"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.62"/>
</svg>