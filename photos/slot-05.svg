<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="t d">
  <title id="t">Sample NGO photo: learning kits</title>
  <desc id="d">Dummy image of children receiving school supplies in a community program.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4e6be"/>
      <stop offset="100%" stop-color="#e9cf82"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.04"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect y="700" width="1600" height="300" fill="#d8b76f" opacity="0.58"/>
  <rect x="640" y="560" width="320" height="180" rx="24" fill="#f7ebce" opacity="0.92"/>
  <rect x="700" y="600" width="88" height="26" rx="8" fill="#c79749"/>
  <rect x="812" y="600" width="88" height="26" rx="8" fill="#9f7e35"/>
  <circle cx="500" cy="470" r="72" fill="#624635"/>
  <rect x="434" y="540" width="132" height="200" rx="56" fill="#d2864f"/>
  <circle cx="770" cy="450" r="80" fill="#4d362a"/>
  <rect x="694" y="528" width="152" height="218" rx="64" fill="#638b4a"/>
  <circle cx="1010" cy="470" r="70" fill="#6d4c3b"/>
  <rect x="944" y="540" width="132" height="200" rx="56" fill="#efba73"/>
  <rect x="250" y="210" width="1100" height="610" rx="36" fill="#fffdf4" opacity="0.25"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.58"/>
</svg>