<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="t d">
  <title id="t">Sample NGO photo: home follow-up</title>
  <desc id="d">Dummy image of a home-based follow-up visit with caregiver and child.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6decf"/>
      <stop offset="100%" stop-color="#c9b698"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.04"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="280" y="220" width="1040" height="520" rx="36" fill="#f7efe1" opacity="0.62"/>
  <rect x="360" y="320" width="280" height="210" rx="22" fill="#e7d6bf"/>
  <rect x="960" y="300" width="240" height="170" rx="20" fill="#deccb1"/>
  <circle cx="620" cy="470" r="82" fill="#5f4333"/>
  <rect x="544" y="548" width="152" height="220" rx="66" fill="#638a6e"/>
  <circle cx="860" cy="480" r="70" fill="#6d4c3a"/>
  <rect x="794" y="548" width="132" height="198" rx="58" fill="#d88a57"/>
  <circle cx="1025" cy="542" r="52" fill="#6e4d3c"/>
  <rect x="975" y="594" width="100" height="150" rx="48" fill="#f0c88c"/>
  <rect y="760" width="1600" height="240" fill="#b39b77" opacity="0.62"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.6"/>
</svg>