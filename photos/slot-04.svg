<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="t d">
  <title id="t">Sample NGO photo: safe spaces</title>
  <desc id="d">Dummy image of children playing in a supervised community safe space.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8e6f5"/>
      <stop offset="100%" stop-color="#b8cbe1"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.04"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect y="700" width="1600" height="300" fill="#8fb2d5" opacity="0.55"/>
  <circle cx="520" cy="470" r="70" fill="#5d4233"/>
  <rect x="454" y="540" width="132" height="200" rx="58" fill="#f0a25d"/>
  <circle cx="760" cy="430" r="82" fill="#4e372b"/>
  <rect x="684" y="510" width="152" height="228" rx="66" fill="#4d7ea8"/>
  <circle cx="980" cy="492" r="64" fill="#6e4d3b"/>
  <rect x="920" y="558" width="120" height="182" rx="54" fill="#7eab65"/>
  <circle cx="1145" cy="530" r="50" fill="#6e4d3b"/>
  <rect x="1097" y="580" width="96" height="154" rx="46" fill="#f1c27f"/>
  <rect x="250" y="220" width="1100" height="600" rx="34" fill="#f4f8ff" opacity="0.24"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.6"/>
</svg>